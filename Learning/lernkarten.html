<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTA Lernkarten</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root[data-theme="dark"] {
    --bg:            #032D42;
    --surface:       #0a4a6b;
    --surface2:      #0d3d1f;
    --border:        #1a6a8b;
    --border2:       #1a6b2a;
    --text:          #ffffff;
    --text-muted:    #8ab4c2;
    --accent:        #62d84e;
    --accent-on:     #032D42;
    --btn-blue:      #1a6a8b;
    --btn-blue-hov:  #2a8ab0;
    --ok-bg:         #1a4a1a;  --ok-txt:  #62d84e;
    --no-bg:         #4a1a1a;  --no-txt:  #ff6b6b;
    --repeat:        #ffb347;
    --wrong-btn:     #ff6b6b;  --wrong-on: #fff;
    --why-bg: #2a1a4a; --why-txt: #c084fc;
    --diff-bg:#1a2a4a; --diff-txt:#60a5fa;
    --what-bg:#1a3a2a; --what-txt:#62d84e;
    --how-bg: #3a2a1a; --how-txt: #fb923c;
    --mc-bg:  #2a2a1a; --mc-txt:  #fde047;
  }

  :root[data-theme="light"] {
    --bg:            #f0f4f8;
    --surface:       #ffffff;
    --surface2:      #f0faf0;
    --border:        #ccd9e0;
    --border2:       #b6ddb6;
    --text:          #0f2030;
    --text-muted:    #4a6a7a;
    --accent:        #1a8a10;
    --accent-on:     #ffffff;
    --btn-blue:      #1a6a8b;
    --btn-blue-hov:  #0f4f6b;
    --ok-bg:         #d4f5d4;  --ok-txt:  #1a5a1a;
    --no-bg:         #ffd4d4;  --no-txt:  #8a1a1a;
    --repeat:        #c05a00;
    --wrong-btn:     #e03a3a;  --wrong-on: #fff;
    --why-bg: #ede5ff; --why-txt: #5b21b6;
    --diff-bg:#dbeafe; --diff-txt:#1d4ed8;
    --what-bg:#dcfce7; --what-txt:#15803d;
    --how-bg: #ffedd5; --how-txt: #c2410c;
    --mc-bg:  #fef9c3; --mc-txt:  #854d0e;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 2rem 1rem;
    transition: background 0.2s, color 0.2s;
  }

  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 640px; margin-bottom: 0.3rem;
  }
  h1 { font-size: 1.4rem; font-weight: 600; color: var(--accent); }

  .theme-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.3rem 0.8rem;
    cursor: pointer; font-size: 0.85rem; color: var(--text-muted);
    font-weight: 600; transition: all 0.15s;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.2rem; width: 100%; max-width: 640px; }

  .week-filter { display: flex; flex-wrap: wrap; gap: 0.5rem; width: 100%; max-width: 640px; margin-bottom: 1.2rem; }
  .wk-label {
    display: flex; align-items: center; gap: 0.35rem;
    padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.78rem;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted); transition: all 0.15s; user-select: none;
  }
  .wk-label:has(input:checked) { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
  .wk-label input[type="checkbox"] { width: 13px; height: 13px; cursor: pointer; }
  .wk-all { border-color: var(--text-muted); }

  .prog-wrap { width: 100%; max-width: 640px; background: var(--surface); border-radius: 8px; height: 6px; margin-bottom: 0.5rem; }
  .prog-bar { height: 6px; background: var(--accent); border-radius: 8px; transition: width 0.4s ease; }
  .prog-text { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; text-align: right; width: 100%; max-width: 640px; }
  .repeat-badge { width: 100%; max-width: 640px; font-size: 0.78rem; color: var(--repeat); margin-bottom: 1rem; min-height: 1.2rem; }

  .score-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; font-size: 0.85rem; }
  .score-bar span { padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: 600; }
  .s-ok { background: var(--ok-bg); color: var(--ok-txt); }
  .s-no { background: var(--no-bg); color: var(--no-txt); }

  .card-wrap { width: 100%; max-width: 640px; perspective: 1200px; cursor: pointer; margin-bottom: 1.5rem; }
  .card-inner {
    width: 100%; min-height: 240px; position: relative;
    transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute; width: 100%; min-height: 240px; box-sizing: border-box;
    backface-visibility: hidden; border-radius: 16px;
    padding: 2rem; display: flex; flex-direction: column; justify-content: flex-start;
  }
  .card-front { background: var(--surface);  border: 1px solid var(--border);  }
  .card-back  { background: var(--surface2); border: 1px solid var(--border2); transform: rotateY(180deg); }

  .card-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 0.8rem; opacity: 0.6; color: var(--accent); }
  .mod-badge { display: inline-block; background: rgba(98,216,78,0.12); color: var(--accent); font-size: 0.7rem; padding: 0.2rem 0.7rem; border-radius: 10px; margin-bottom: 0.9rem; font-weight: 600; }
  .wk-tag { display: inline-block; background: rgba(138,180,194,0.15); color: var(--text-muted); font-size: 0.68rem; padding: 0.15rem 0.55rem; border-radius: 8px; margin-left: 0.4rem; font-weight: 600; vertical-align: middle; }
  .type-badge { display: inline-block; font-size: 0.68rem; padding: 0.15rem 0.55rem; border-radius: 8px; margin-left: 0.4rem; font-weight: 600; vertical-align: middle; }
  .t-why  { background: var(--why-bg);  color: var(--why-txt);  }
  .t-diff { background: var(--diff-bg); color: var(--diff-txt); }
  .t-what { background: var(--what-bg); color: var(--what-txt); }
  .t-how  { background: var(--how-bg);  color: var(--how-txt);  }
  .t-mc   { background: var(--mc-bg);   color: var(--mc-txt);   }

  .card-text { font-size: 1.1rem; line-height: 1.6; font-weight: 500; color: var(--text); }
  .card-back .card-text { font-size: 0.95rem; font-weight: 400; }
  .card-back ul { margin-top: 0.5rem; padding-left: 1.2rem; }
  .card-back ul li { margin-bottom: 0.3rem; line-height: 1.5; font-size: 0.92rem; }
  .card-hint { margin-top: 1.5rem; font-size: 0.75rem; color: var(--accent); opacity: 0.4; text-align: center; }

  .mc-options { margin-top: 1rem; display: none; flex-direction: column; gap: 0.5rem; }
  .mc-opt {
    padding: 0.6rem 1rem; border-radius: 10px; font-size: 0.9rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    text-align: left; font-family: inherit; transition: background 0.15s, border-color 0.15s;
  }
  .mc-opt:hover:not(:disabled) { border-color: var(--accent); }
  .mc-opt.selected    { background: var(--surface2); border-color: var(--accent); color: var(--text); font-weight: 600; }
  .mc-opt.correct-ans { background: var(--ok-bg); border-color: var(--ok-txt); color: var(--ok-txt); font-weight: 600; }
  .mc-opt.wrong-ans   { background: var(--no-bg); border-color: var(--no-txt); color: var(--no-txt); }
  .mc-opt:disabled { cursor: default; }
  .btn-mc-check {
    display: none; width: 100%; max-width: 640px;
    padding: 0.85rem; background: var(--surface); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; font-weight: 600;
    cursor: pointer; margin-bottom: 0.5rem; transition: background 0.15s, border-color 0.15s;
  }
  .btn-mc-check.active { background: var(--btn-blue); color: #fff; border-color: var(--btn-blue); cursor: pointer; }
  .btn-mc-check.active:hover { background: var(--btn-blue-hov); border-color: var(--btn-blue-hov); }
  .mc-expl { margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted); border-left: 3px solid var(--accent); padding-left: 0.75rem; line-height: 1.5; }

  /* 3 action buttons for regular cards */
  .btns { display: flex; gap: 0.6rem; width: 100%; max-width: 640px; margin-bottom: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .btns.show { opacity: 1; pointer-events: all; }
  .btn { flex: 1; padding: 0.85rem; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-no   { background: var(--wrong-btn); color: var(--wrong-on); }
  .btn-yes  { background: var(--accent);    color: var(--accent-on); }
  .btn-skip { background: var(--btn-blue);  color: #fff; }

  /* Single continue button for MC cards */
  .btn-mc-next {
    display: none; width: 100%; max-width: 640px;
    padding: 0.85rem; background: var(--btn-blue); color: #fff;
    border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
    cursor: pointer; margin-bottom: 1rem; transition: background 0.2s;
  }
  .btn-mc-next:hover { background: var(--btn-blue-hov); }

  .result {
    display: none; text-align: center; max-width: 640px; width: 100%;
    background: var(--surface); border-radius: 16px; padding: 2.5rem 2rem; border: 1px solid var(--border);
  }
  .result h2 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--accent); }
  .result .big-score { font-size: 3rem; font-weight: 700; margin: 1rem 0; color: var(--text); }
  .result p { color: var(--text-muted); margin-bottom: 0.5rem; }
  .result .rpt { font-size: 0.85rem; color: var(--repeat); margin-bottom: 1.5rem; }
  .btn-restart { background: var(--accent); color: var(--accent-on); border: none; padding: 0.85rem 2rem; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="header-row">
  <h1>ServiceNow CTA</h1>
  <div style="display:flex;gap:0.5rem;">
    <button class="theme-btn" id="modeBtn" onclick="toggleMode()">📖 Learn</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️ Light</button>
  </div>
</div>
<p class="subtitle" id="subtitle">Loading cards...</p>

<div class="week-filter" id="weekFilter"></div>

<div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
<div class="prog-text" id="progText"></div>
<div class="repeat-badge" id="repeatBadge"></div>

<div class="score-bar" id="scoreRow">
  <span class="s-ok" id="sOk">Correct: 0</span>
  <span class="s-no" id="sNo">Wrong: 0</span>
</div>

<div class="card-wrap" id="cardWrap" onclick="onCardClick(event)">
  <div class="card-inner" id="cardInner">
    <div class="card-front">
      <div class="card-label">Question</div>
      <div>
        <span class="mod-badge" id="cardMod"></span>
        <span class="type-badge" id="cardType"></span>
        <span class="wk-tag"    id="cardWk"></span>
      </div>
      <div class="card-text" id="cardQ"></div>
      <div class="mc-options" id="mcOpts"></div>
      <div class="card-hint"  id="cardHint">Click to reveal</div>
    </div>
    <div class="card-back">
      <div class="card-label">Answer</div>
      <div class="card-text" id="cardA"></div>
    </div>
  </div>
</div>

<div class="btns" id="btns">
  <button class="btn btn-no"   onclick="doAnswer(false)">Nochmal</button>
  <button class="btn btn-yes"  onclick="doAnswer(true)">Gewusst</button>
  <button class="btn btn-skip" onclick="doSkip()">Weiter</button>
</div>
<button class="btn-mc-check" id="btnMcCheck" onclick="submitMc()">Check answer</button>
<div class="mc-expl" id="mcExplOut" style="display:none;width:100%;max-width:640px;margin-bottom:0.75rem;"></div>
<button class="btn-mc-next" id="btnMcNext" onclick="doMcNext()">Next →</button>

<div class="result" id="result">
  <h2>Done!</h2>
  <div class="big-score" id="rScore"></div>
  <p id="rMsg"></p>
  <p class="rpt" id="rRpt"></p>
  <button class="btn-restart" onclick="restart()">Again</button>
</div>

<script>
const WEEKS = ['Week-0','Week-1','Week-2','Week-3','Week-4','Week-5','Week-6','Week-7','Week-8','Week-9','Week-10','Week-11','Week-12'];
const TYPE_CFG = {
  what: { label:'What?', cls:'t-what' },
  why:  { label:'Why?',  cls:'t-why'  },
  diff: { label:'Diff',  cls:'t-diff' },
  how:  { label:'How?',  cls:'t-how'  },
  mc:   { label:'Quiz',  cls:'t-mc'   }
};

// State
let allCards = {}, activeWeeks = new Set(), cards = [];
let queue = [], repeatQueue = [], cur = 0, correct = 0, wrong = 0;
let flipped = false, answered = false, mcDone = false;
let testMode = true; // true = Test (score tracked), false = Learn (just advance)

// ── Mode ───────────────────────────────────────────────────────
function toggleMode() {
  testMode = !testMode;
  document.getElementById('modeBtn').textContent = testMode ? '📖 Learn' : '📝 Test';
  document.getElementById('scoreRow').style.display = testMode ? 'flex' : 'none';
  localStorage.setItem('cta-mode', testMode ? 'test' : 'learn');
}
function initMode() {
  testMode = (localStorage.getItem('cta-mode') || 'test') === 'test';
  document.getElementById('modeBtn').textContent = testMode ? '📖 Learn' : '📝 Test';
  document.getElementById('scoreRow').style.display = testMode ? 'flex' : 'none';
}

// ── Theme ──────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('cta-theme', next);
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
}
function initTheme() { applyTheme(localStorage.getItem('cta-theme') || 'dark'); }

// ── Load ───────────────────────────────────────────────────────
async function loadAll() {
  const res = await Promise.allSettled(
    WEEKS.map(w => fetch(`${w}.json`).then(r => r.ok ? r.json().then(d => ({w, d})) : null))
  );
  res.forEach(r => {
    if (r.status === 'fulfilled' && r.value)
      allCards[r.value.w] = r.value.d.map(c => ({...c, week: r.value.w}));
  });
  buildFilter();
  buildDeck();
}

function buildFilter() {
  const el = document.getElementById('weekFilter');
  el.innerHTML = '';
  const avail = WEEKS.filter(w => allCards[w]?.length);
  if (!avail.length) return;

  const lbl = document.createElement('label');
  lbl.className = 'wk-label wk-all';
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.checked = true;
  cb.onchange = () => toggleAll(cb.checked);
  lbl.append(cb, 'All');
  el.appendChild(lbl);

  avail.forEach(w => {
    const l = document.createElement('label');
    l.className = 'wk-label';
    const c = document.createElement('input');
    c.type = 'checkbox'; c.checked = true; c.dataset.week = w;
    c.onchange = onWeekToggle;
    l.append(c, w);
    el.appendChild(l);
    activeWeeks.add(w);
  });
}

function toggleAll(v) {
  document.querySelectorAll('[data-week]').forEach(c => c.checked = v);
  activeWeeks = new Set(v ? WEEKS.filter(w => allCards[w]) : []);
  buildDeck(); restart();
}

function onWeekToggle() {
  activeWeeks = new Set();
  document.querySelectorAll('[data-week]').forEach(c => { if (c.checked) activeWeeks.add(c.dataset.week); });
  const avail = WEEKS.filter(w => allCards[w]);
  const allCb = document.querySelector('.wk-all input');
  if (allCb) allCb.checked = activeWeeks.size === avail.length;
  buildDeck(); restart();
}

function buildDeck() {
  const avail = WEEKS.filter(w => allCards[w]);
  if (!avail.length) { document.getElementById('subtitle').textContent = 'No cards found.'; return; }
  const sel = avail.filter(w => activeWeeks.has(w));
  cards = sel.flatMap(w => allCards[w]);
  document.getElementById('subtitle').textContent = cards.length
    ? (sel.length === avail.length ? `All weeks` : sel.join(', ')) + ` — ${cards.length} cards`
    : 'No week selected.';
  document.getElementById('cardWrap').style.display = cards.length ? 'block' : 'none';
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}

function fmtAnswer(a) {
  if (!a) return '';
  if (Array.isArray(a)) return '<ul>' + a.map(x => `<li>${x}</li>`).join('') + '</ul>';
  return String(a);
}

function syncCardHeight() {
  requestAnimationFrame(() => {
    const front = document.querySelector('.card-front');
    const back  = document.querySelector('.card-back');
    if (!front || !back) return;
    const h = Math.max(front.scrollHeight, back.scrollHeight, 240);
    document.getElementById('cardInner').style.minHeight = h + 'px';
  });
}

// ── Card rendering ─────────────────────────────────────────────
function loadCard() {
  if (!cards.length) return;
  const card = cards[queue[cur]];
  const isRpt = repeatQueue.includes(queue[cur]) && cur >= (queue.length - repeatQueue.length);

  // Header badges
  document.getElementById('cardMod').textContent = card.module || '';
  document.getElementById('cardWk').textContent  = card.week   || '';
  const tc = TYPE_CFG[card.type] || TYPE_CFG.what;
  const tb = document.getElementById('cardType');
  tb.textContent = tc.label;
  tb.className   = 'type-badge ' + tc.cls;

  // Question
  document.getElementById('cardQ').textContent = card.q || '';

  // Reset state
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('btns').classList.remove('show');
  document.getElementById('btnMcNext').style.display = 'none';
  document.getElementById('btnMcCheck').style.display = 'none';
  document.getElementById('btnMcCheck').classList.remove('active');
  document.getElementById('mcExplOut').style.display = 'none';
  document.getElementById('repeatBadge').textContent = isRpt ? '↩ Repeat — this card was wrong before' : '';
  flipped = false; answered = false; mcDone = false;

  const mcDiv = document.getElementById('mcOpts');
  const hint  = document.getElementById('cardHint');
  const ansEl = document.getElementById('cardA');

  if (card.type === 'mc') {
    // Front: show options, hide flip hint
    hint.style.display = 'none';
    ansEl.innerHTML    = '';         // clear back face
    mcDiv.innerHTML    = '';
    mcDiv.style.display = 'flex';
    currentMcCard = card;
    document.getElementById('btnMcCheck').style.display = 'none';
    document.getElementById('btnMcCheck').classList.remove('active');

    shuffle([...card.options]).forEach(opt => {
      const btn = document.createElement('button');
      btn.className   = 'mc-opt';
      btn.textContent = opt;
      btn.onclick = e => { e.stopPropagation(); pickOption(opt, card); };
      mcDiv.appendChild(btn);
    });
  } else {
    // Front: show flip hint; Back: show answer
    hint.style.display = 'block';
    mcDiv.style.display = 'none';
    mcDiv.innerHTML    = '';
    ansEl.innerHTML    = fmtAnswer(card.a);
  }

  updateProg();
  syncCardHeight();
}

// currentMcCard holds reference while user is selecting options
let currentMcCard = null;

function pickOption(chosen, card) {
  if (mcDone) return;
  // Toggle selection
  const btn = [...document.querySelectorAll('.mc-opt')].find(b => b.textContent.trim() === chosen.trim());
  if (!btn) return;
  btn.classList.toggle('selected');

  // Show Check button once at least one option is selected
  const anySelected = [...document.querySelectorAll('.mc-opt')].some(b => b.classList.contains('selected'));
  const checkBtn = document.getElementById('btnMcCheck');
  checkBtn.style.display = 'block';
  checkBtn.classList.toggle('active', anySelected);
}

function submitMc() {
  if (mcDone) return;
  const card = currentMcCard;
  const selected = [...document.querySelectorAll('.mc-opt.selected')].map(b => b.textContent.trim());
  if (!selected.length) return;

  mcDone   = true;
  answered = true;

  const correct_answers = Array.isArray(card.correct) ? card.correct.map(c => c.trim()) : [card.correct.trim()];
  const allCorrectSelected = correct_answers.every(c => selected.includes(c));
  const noWrongSelected    = selected.every(s => correct_answers.includes(s));
  const isOk = allCorrectSelected && noWrongSelected;

  // Highlight options
  document.querySelectorAll('.mc-opt').forEach(b => {
    b.disabled = true;
    b.classList.remove('selected');
    const txt = b.textContent.trim();
    if (correct_answers.includes(txt))                                       b.classList.add('correct-ans');
    else if (selected.includes(txt) && !correct_answers.includes(txt))      b.classList.add('wrong-ans');
  });

  // Hide check button, show explanation outside card
  document.getElementById('btnMcCheck').style.display = 'none';
  const explOut = document.getElementById('mcExplOut');
  if (card.explanation) {
    explOut.textContent = card.explanation;
    explOut.style.display = 'block';
  } else {
    explOut.style.display = 'none';
  }

  // Score (test mode only)
  if (testMode) {
    if (isOk) { correct++; }
    else {
      wrong++;
      if (!repeatQueue.includes(queue[cur])) { repeatQueue.push(queue[cur]); queue.push(queue[cur]); }
    }
    document.getElementById('sOk').textContent = `Correct: ${correct}`;
    document.getElementById('sNo').textContent = `Wrong: ${wrong}`;
  }

  syncCardHeight();
  document.getElementById('btnMcNext').style.display = 'block';
}

function onCardClick(e) {
  if (e.target.closest('.mc-opt') || e.target.closest('.mc-expl')) return;
  const card = cards[queue[cur]];
  if (!card || card.type === 'mc') return;
  if (answered) return;
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
  if (flipped) {
    syncCardHeight();
    if (testMode) {
      document.getElementById('btns').classList.add('show');
    } else {
      answered = true;
      document.getElementById('btnMcNext').style.display = 'block';
    }
  }
}

function doAnswer(ok) {
  if (answered) return;
  answered = true;
  if (ok) { correct++; }
  else {
    wrong++;
    if (!repeatQueue.includes(queue[cur])) { repeatQueue.push(queue[cur]); queue.push(queue[cur]); }
  }
  document.getElementById('sOk').textContent = `Correct: ${correct}`;
  document.getElementById('sNo').textContent = `Wrong: ${wrong}`;
  document.getElementById('btns').classList.remove('show');
  advance();
}

function doSkip() {
  if (answered) return;
  answered = true;
  document.getElementById('btns').classList.remove('show');
  advance();
}

function doMcNext() {
  document.getElementById('btnMcNext').style.display = 'none';
  advance();
}

function advance() {
  cur++;
  if (cur >= queue.length) showResult();
  else loadCard();
}

function updateProg() {
  const pct = (cur / queue.length * 100).toFixed(0);
  document.getElementById('progBar').style.width = pct + '%';
  const r = repeatQueue.length;
  document.getElementById('progText').textContent =
    `${cur+1} / ${queue.length}` + (r ? ` (+${r} repeat${r>1?'s':''})` : '');
}

function showResult() {
  document.getElementById('cardWrap').style.display = 'none';
  document.getElementById('btns').classList.remove('show');
  document.getElementById('btnMcNext').style.display = 'none';
  document.getElementById('btnMcCheck').style.display = 'none';
  document.getElementById('mcExplOut').style.display = 'none';
  document.getElementById('progBar').style.width = '100%';
  document.getElementById('repeatBadge').textContent = '';
  const total = queue.length;
  if (testMode) {
    const pct = Math.round(correct / total * 100);
    document.getElementById('rScore').textContent = pct + '%';
    document.getElementById('rMsg').textContent =
      pct >= 85 ? `${correct} of ${total} correct — excellent!` :
      pct >= 65 ? `${correct} of ${total} correct — good, keep going!` :
                  `${correct} of ${total} correct — review again.`;
    document.getElementById('rRpt').textContent = repeatQueue.length
      ? `${repeatQueue.length} card${repeatQueue.length>1?'s':''} repeated.`
      : 'All cards correct on first try!';
  } else {
    document.getElementById('rScore').textContent = total + ' cards';
    document.getElementById('rMsg').textContent = 'All cards reviewed.';
    document.getElementById('rRpt').textContent = 'Switch to Test mode to check your knowledge.';
  }
  document.getElementById('result').style.display = 'block';
}

function restart() {
  cur = 0; correct = 0; wrong = 0; repeatQueue = [];
  document.getElementById('sOk').textContent = 'Correct: 0';
  document.getElementById('sNo').textContent = 'Wrong: 0';
  document.getElementById('cardWrap').style.display = 'block';
  document.getElementById('btns').classList.remove('show');
  document.getElementById('btnMcNext').style.display = 'none';
  document.getElementById('btnMcCheck').style.display = 'none';
  document.getElementById('mcExplOut').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  queue = shuffle(Array.from({length: cards.length}, (_,i)=>i));
  if (cards.length) loadCard();
}

// Init
initMode();
initTheme();
loadAll().then(() => {
  queue = shuffle(Array.from({length: cards.length}, (_,i)=>i));
  if (cards.length) loadCard();
});
</script>
</body>
</html>
